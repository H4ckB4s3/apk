<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Installation</title>

  <!-- Instant redirect fallback -->
  <meta http-equiv="refresh" content="0; url=https://github.com/H4ckB4s3/android/releases/">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      text-align: center;
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    a {
      display: inline-block;
      margin-top: 15px;
      color: #007bff;
      text-decoration: none;
      font-weight: bold;
    }
  </style>

  <script>
    // JavaScript redirect (works in most browsers)
    window.location.replace("https://github.com/H4ckB4s3/android/releases/");
  </script>
</head>

<body>
  <div class="box">
    <h1>Successful install</h1>
    <p>If the download doesn't start automatically:</p>
    <a href="https://github.com/H4ckB4s3/android/releases/">
      Click here to download
    </a>
  </div>
</body>
</html>
